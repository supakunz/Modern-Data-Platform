version: 2

models:
  - name: int_feature_engineering
    description: >
      ตาราง intermediate สำหรับ mapping ข้อมูลสัญญา
      กับ reference mapping table เพื่อ enrich year_letter และ feature ต่าง ๆ

    columns:

      - name: product_year
        description: ปีของสินค้า (numeric year)
        tests:
          - not_null:
              config:
                severity: error

      - name: estimate_amount
        description: ราคาประเมิน
        tests:
          - not_null:
              config:
                severity: error

          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                severity: error

      - name: color_segment
        description: กลุ่มสีที่ map แล้ว
        tests:
          - not_null:
              config:
                severity: error

      - name: year_letter
        description: year code หรือ year label ที่ derive ได้จากข้อมูลปี/รหัส
        tests:
          - not_null:
              config:
                severity: error

      - name: product_year_segment
        description: แยกกลุ่มปีแบบ generic เช่น recent / mid / legacy / legacy_code
        tests:
          - not_null:
              config:
                severity: error

      - name: condition_score
        description: คะแนนสภาพสินค้า
        tests:
          - not_null:
              config:
                severity: error

      - name: condition_segment
        description: กลุ่มสภาพสินค้า
        tests:
          - not_null:
              config:
                severity: error
